services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: diabtrack-app
    container_name: diabtrack-container
    restart: unless-stopped
    tty: true
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-diabtrack}
      DB_USERNAME: ${DB_USERNAME:-diabuser}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
    ports:
      - "${APP_PORT:-80}:8000"
    volumes:
      - .:/var/www/html
      - /var/www/html/node_modules
      - /var/www/html/vendor
      - /var/www/html/bootstrap/cache
      - /var/www/html/public/build
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - diabtrack-network

  db:
    image: mysql:8.0
    container_name: diabtrack-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-diabtrack}
      MYSQL_USER: ${DB_USERNAME:-diabuser}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:${DB_PORT_EXTERNAL:-3306}:3306"
    volumes:
      - diabtrack-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - diabtrack-network

  redis:
    image: redis:alpine
    container_name: diabtrack-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - diabtrack-network

networks:
  diabtrack-network:
    driver: bridge

volumes:
  diabtrack-db-data:
