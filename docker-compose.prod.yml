services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: diabtrack-app-prod
    container_name: diabtrack-app
    restart: always
    env_file: .env
    environment:
      REDIS_HOST: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
    ports:
      - "${APP_PORT:-80}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - diabtrack-network

  db:
    image: mysql:8.0
    container_name: diabtrack-db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-diabtrack}
      MYSQL_USER: ${DB_USERNAME:-diabuser}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - diabtrack-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - diabtrack-network

  redis:
    image: redis:alpine
    container_name: diabtrack-redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - diabtrack-network

networks:
  diabtrack-network:
    driver: bridge

volumes:
  diabtrack-db-data:
